# fly.toml app configuration file generated for blimbo-cdta on 2026-03-18T03:15:00-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'blimbo-cdta'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_STORAGE_DIR = '/data'
  FLASK_ENV = 'production'
  HOST = '0.0.0.0'
  PORT = '8080'

[[mounts]]
  source = 'app_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
